<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avocado Ripeness Assessment System</title>
    <style>
        :root {
            --primary: #27ae60;
            --primary-light: #2ecc71;
            --primary-bg: #f0fdf4;
            --dark-panel: #1e293b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .brand-header {
            margin-bottom: 24px;
            text-align: center;
        }

        .brand-badge {
            background: var(--dark-panel);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: inline-block;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.15);
        }

        .container {
            background: var(--card-bg);
            max-width: 480px;
            width: 100%;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.02);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: var(--dark-panel);
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: #fafafa;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: var(--primary-bg);
            transform: scale(1.01);
        }

        .upload-icon-wrapper {
            width: 60px;
            height: 60px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
            margin-bottom: 16px;
            font-size: 24px;
            transition: transform 0.2s ease;
        }

        .upload-area:hover .upload-icon-wrapper {
            transform: translateY(-2px);
        }

        #imagePreview {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 12px;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: var(--dark-panel);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.1);
        }

        .btn:hover {
            background-color: #0f172a;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(30, 41, 59, 0.15);
        }

        .btn:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Result Panel Layout */
        .result-box {
            margin-top: 28px;
            padding: 24px;
            border-radius: 16px;
            display: none;
            text-align: left;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .result-box.iva {
            background-color: var(--primary-bg);
            border: 1px solid rgba(39, 174, 96, 0.2);
        }

        .result-box.bichi {
            background-color: var(--danger-bg);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .result-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .result-badge {
            font-size: 13px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .iva .result-badge {
            background: var(--primary);
            color: white;
        }

        .bichi .result-badge {
            background: var(--danger);
            color: white;
        }

        .result-confidence {
            font-size: 13px;
            font-weight: 700;
            color: var(--dark-panel);
            background: rgba(255, 255, 255, 0.7);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .result-maelezo {
            font-size: 14px;
            color: #334155;
            line-height: 1.6;
        }

        .loader {
            display: none;
            margin: 24px auto;
            border: 3.5px solid #e2e8f0;
            border-top: 3.5px solid var(--primary);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.85s linear infinite;
        }

        .footer-credit {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="brand-header">
    <div class="brand-badge">Computer Vision Engine</div>
</div>

<div class="container">
    <h1>Avocado Intelligence</h1>
    <p class="subtitle">Upload or capture an image of an avocado to run a real-time computer vision maturity assessment.</p>

    <form id="uploadForm">
        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div id="uploadPrompt">
                <div class="upload-icon-wrapper">🥑</div>
                <p style="font-weight: 600; color: #334155; font-size: 15px;">Click to upload image</p>
                <p style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">Supports JPG, JPEG or PNG formats</p>
            </div>
            <img id="imagePreview" alt="Evaluation Target">
        </div>
        
        <input type="file" id="fileInput" name="file" accept="image/*" required>
        <button type="submit" class="btn" id="submitBtn" disabled>Run Inference</button>
    </form>

    <div class="loader" id="loader"></div>

    <div class="result-box" id="resultBox">
        <div class="result-meta">
            <div class="result-badge" id="resHali">Evaluation</div>
            <div class="result-confidence" id="resUhakika">Confidence: --</div>
        </div>
        <div class="result-maelezo" id="resMaelezo">---</div>
    </div>
</div>

<div class="footer-credit">
    Automated Crop Quality Estimation Dashboard
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const uploadPrompt = document.getElementById('uploadPrompt');
    const submitBtn = document.getElementById('submitBtn');
    const uploadForm = document.getElementById('uploadForm');
    const loader = document.getElementById('loader');
    const resultBox = document.getElementById('resultBox');
    const dropZone = document.getElementById('dropZone');

    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                uploadPrompt.style.display = 'none';
                submitBtn.disabled = false;
                resultBox.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    });

    uploadForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        loader.style.display = 'block';
        resultBox.style.display = 'none';
        submitBtn.disabled = true;

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            loader.style.display = 'none';
            submitBtn.disabled = false;

            if (data.status === 'success') {
                resultBox.className = 'result-box ' + data.code;
                
                document.getElementById('resHali').innerText = data.hali;
                document.getElementById('resUhakika').innerText = `Confidence: ${data.uhakika}`;
                document.getElementById('resMaelezo').innerText = data.maelezo;
                
                resultBox.style.display = 'block';
            } else {
                alert('Analysis Error: ' + (data.error || 'Unknown classification fault'));
            }

        } catch (error) {
            loader.style.display = 'none';
            submitBtn.disabled = false;
            alert('Failed to establish gateway pipeline to inference server: ' + error.message);
        }
    });
</script>

</body>
</html>
