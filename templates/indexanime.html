<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixa Veo AI - Text to Animation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">
                Text-to-Animation Studio
            </h1>
            <p class="text-slate-400 mt-3 text-lg">Tengeneza na Upakue Video za AI kwa kutumia Google Veo 3.1</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 glass-panel p-6 rounded-2xl shadow-xl flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-indigo-500 rounded-full"></span> Studio Settings
                    </h2>
                    
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-slate-300 mb-2">Andika Wazo la Animation</label>
                        <textarea id="prompt" rows="4" 
                            class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none placeholder-slate-500 resize-none"
                            placeholder="Mfano: A cute 3D robot dancing in the rain, neon lights..."></textarea>
                    </div>

                    <div class="mb-5">
                        <label class="block text-sm font-medium text-slate-300 mb-2">Style ya Animation</label>
                        <select id="style" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <option value="3D Pixar-style digital art">3D Pixar Style</option>
                            <option value="Cinematic photorealistic video">Photorealistic</option>
                            <option value="Anime aesthetic hand-drawn">Anime / Katuni</option>
                            <option value="Cyberpunk futuristic render">Cyberpunk Art</option>
                        </select>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-300 mb-2">Ukubwa wa Screen</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="aspect_ratio" value="16:9" checked class="sr-only peer">
                                <div class="p-3 text-center rounded-xl border border-slate-700 bg-slate-900/30 peer-checked:border-indigo-500 peer-checked:bg-indigo-500/10 transition">
                                    16:9 (Landscape)
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="aspect_ratio" value="9:16" class="sr-only peer">
                                <div class="p-3 text-center rounded-xl border border-slate-700 bg-slate-900/30 peer-checked:border-indigo-500 peer-checked:bg-indigo-500/10 transition">
                                    9:16 (TikTok)
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <button id="generateBtn" onclick="startGeneration()" 
                    class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold rounded-xl shadow-lg transition cursor-pointer flex justify-center items-center gap-2">
                    Generate Animation
                </button>
            </div>

            <div class="lg:col-span-7 glass-panel p-6 rounded-2xl shadow-xl flex flex-col items-center justify-center min-h-[400px] relative">
                
                <div id="placeholder" class="text-center py-12">
                    <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-700">🎬</div>
                    <p class="text-slate-400">Video yako itaonekana hapa.</p>
                </div>

                <div id="loading" class="hidden text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500 mx-auto mb-4"></div>
                    <p class="text-indigo-400 font-medium">Veo AI inatengeneza video kwenye Cloud...</p>
                    <p id="timer" class="text-xs text-slate-500 mt-2">Muda uliopita: 0s (Inaweza kuchukua sekunde 30-90)</p>
                </div>

                <div id="videoContainer" class="hidden w-full flex flex-col items-center gap-4">
                    <video id="videoPlayer" controls class="w-full rounded-xl shadow-2xl border border-slate-800" src=""></video>
                    
                    <a id="downloadBtn" href="" download
                        class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-xl text-center shadow-lg transition flex items-center justify-center gap-2">
                        📥 Download Video (Hifadhi Kwenye Kifaa)
                    </a>

                    <div class="w-full bg-slate-900/60 p-3 rounded-lg border border-slate-800 text-sm">
                        <span class="text-indigo-400 font-semibold">Prompt Iliyotumika:</span>
                        <p id="usedPrompt" class="text-slate-300 italic mt-1"></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let statusInterval;
        let timerInterval;
        let secondsElapsed = 0;

        async function startGeneration() {
            const prompt = document.getElementById('prompt').value;
            const style = document.getElementById('style').value;
            const aspect_ratio = document.querySelector('input[name="aspect_ratio"]:checked').value;
            
            const btn = document.getElementById('generateBtn');
            const placeholder = document.getElementById('placeholder');
            const loading = document.getElementById('loading');
            const videoContainer = document.getElementById('videoContainer');

            if(!prompt.trim()) {
                alert("Tafadhali andika maelezo kwanza!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Starting task...";
            placeholder.classList.add('hidden');
            videoContainer.classList.add('hidden');
            loading.classList.remove('hidden');
            
            secondsElapsed = 0;
            document.getElementById('timer').innerText = `Muda uliopita: 0s`;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                document.getElementById('timer').innerText = `Muda uliopita: ${secondsElapsed}s (Tafadhali subiri...)`;
            }, 1000);

            try {
                const response = await fetch('/generate-animation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, style, aspect_ratio })
                });

                const data = await response.json();

                if(data.success) {
                    btn.innerText = "Generating video...";
                    document.getElementById('usedPrompt').innerText = data.prompt_used;
                    
                    // Anza kufanya polling kila baada ya sekunde 5
                    checkVideoStatus(data.operation_id);
                } else {
                    alert("Kosa: " + data.error);
                    resetUI();
                }
            } catch (error) {
                alert("Imeshindikana kuwasiliana na server.");
                resetUI();
            }
        }

        function checkVideoStatus(operation_id) {
            statusInterval = setInterval(async () => {
                try {
                    const response = await fetch('/check-status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ operation_id })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        alert("Google Error: " + data.error);
                        resetUI();
                        return;
                    }
                    
                    if (data.done && data.success) {
                        clearInterval(statusInterval);
                        clearInterval(timerInterval);
                        
                        // Set sources
                        document.getElementById('videoPlayer').src = data.video_url;
                        document.getElementById('downloadBtn').href = data.video_url;
                        
                        // Update UI View
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('videoContainer').classList.remove('hidden');
                        
                        const btn = document.getElementById('generateBtn');
                        btn.disabled = false;
                        btn.innerText = "Generate Animation";
                    }
                } catch (e) {
                    console.error("Error checking status:", e);
                }
            }, 5000);
        }

        function resetUI() {
            clearInterval(statusInterval);
            clearInterval(timerInterval);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
            const btn = document.getElementById('generateBtn');
            btn.disabled = false;
            btn.innerText = "Generate Animation";
        }
    </script>
</body>
</html>
