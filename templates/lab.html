<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudLab - Virtual Desktop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #16213e;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .desktop-container {
            flex: 1;
            background: #0f0f0f;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        button {
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background: #45a049;
        }
        
        .info {
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <strong>☁️ CloudLab - Virtual Desktop</strong>
            <span class="info"> | IP: {{ vm_ip }}</span>
        </div>
        <div>
            <button onclick="window.close()">🔒 Funga Lab</button>
        </div>
    </div>
    <div class="desktop-container">
        <iframe src="{{ guac_url }}"></iframe>
    </div>
    
    <script>
        // Kumbuka mwanafunzi kuhusu muda
        setTimeout(() => {
            alert("Kumbuka: Lab yako inafutwa kiotomatiki baada ya masaa 24 ikiwa haitumiki.\n\nIli kuepuka gharama, futa lab yako ukishamaliza kutumia.");
        }, 10000);
    </script>
</body>
</html>
